# ============================================================
#  Nginx config for AmplifAI
#
#  1. Copy to /etc/nginx/sites-available/amplifai
#  2. Replace YOUR_DOMAIN with your real domain (e.g. amplifai.loreal.sg)
#  3. ln -s /etc/nginx/sites-available/amplifai /etc/nginx/sites-enabled/
#  4. nginx -t && systemctl reload nginx
#  5. certbot --nginx -d YOUR_DOMAIN   (adds the SSL block automatically)
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name amplifai.loreal.sg;

    # Certbot will insert the SSL redirect here after running certbot --nginx
    # Leave this block as-is — certbot modifies it automatically.

    # Proxy all traffic to the Nuxt Nitro server
    location / {
        proxy_pass          http://127.0.0.1:8111;
        proxy_http_version  1.1;

        # WebSocket support (SSE / HMR in dev, future real-time features)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Forward real client info
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Static assets — serve directly from Nginx with long cache TTL
    location /_nuxt/ {
        alias /var/www/amplifai/.output/public/_nuxt/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # PWA manifest + service worker — no cache so updates propagate
    location ~* \.(webmanifest|sw\.js)$ {
        proxy_pass http://127.0.0.1:8111;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Security headers
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "SAMEORIGIN"      always;
    add_header Referrer-Policy         "strict-origin"   always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/x-javascript text/xml application/xml
               application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Logs
    access_log /var/log/nginx/amplifai.access.log;
    error_log  /var/log/nginx/amplifai.error.log;
}
